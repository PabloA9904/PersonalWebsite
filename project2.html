<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 2</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #32527B 0%, #7285A5 50%, #32527B 100%);
            font-family: Arial, sans-serif;
            min-height: 100vh;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 15px;
            background-color: #32527B;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        .back-link:hover {
            background-color: #253D5B;
        }
        h1 {
            color: white;
            text-align: center;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .download-link {
            display: inline-block;
            padding: 10px 15px;
            background-color: #d4af37;
            color: black;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s ease;
            font-weight: bold;
        }
        .download-link:hover {
            background-color: #e5c158;
        }
        .pdf-container {
            margin-top: 30px;
            max-width: 100%;
        }
        .pdf-container iframe {
            width: 100%;
            height: 800px;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="controls">
        <a href="index.html" class="back-link">← Back to Home</a>
        <a href="CSN190fullpaper.pdf" download class="download-link">⬇️ Download Paper</a>
    </div>
    <h1>What is a firewall and how it helps protect network?</h1>
    <div class="pdf-container">
        <iframe src="CSN190fullpaper.pdf"></iframe>
    </div>
</body>
</html>
